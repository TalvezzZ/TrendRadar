# ═══════════════════════════════════════════════════════════════
#                   TrendRadar 金融跟踪映射配置
#                        Finance Mapping Config
# ═══════════════════════════════════════════════════════════════
#
# 🎯 功能说明
# 定义热点关键词到股票/基金的映射关系
# 当新闻推送包含这些关键词时，自动显示相关标的的涨跌情况
#
# 📝 配置格式
# mappings:
#   关键词:
#     - symbol: "代码"        # 标的代码
#       type: "类型"          # stock | etf | fund
#       market: "市场"        # A股 | 美股 | 港股
#       name: "名称"          # 显示名称
#       priority: 1           # 优先级（数字越小越靠前）
#
# 💡 提示
# - priority 决定推送中的显示顺序
# - 每个关键词可以映射多个标的
# - type 支持：stock（股票）、etf（场内基金）、fund（开放式基金）
# - 开放式基金数据为 T-1（前一交易日）
#
# ═══════════════════════════════════════════════════════════════

