<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendRadar 记忆可视化仪表板</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .stat-card h3 {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .chart-container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .chart-container h2 {
            font-size: 1.3em;
            margin-bottom: 15px;
            color: #333;
        }

        .chart {
            width: 100%;
            height: 400px;
        }

        .timeline {
            height: 500px;
        }

        .relations {
            height: 600px;
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 30px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 TrendRadar 记忆可视化仪表板</h1>
            <p>智能记忆系统 · 数据分析 · 趋势洞察</p>
        </div>

        <div class="stats-grid" id="statsGrid"></div>

        <div class="chart-container">
            <h2>📈 记忆时间线</h2>
            <div id="timelineChart" class="chart timeline"></div>
        </div>

        <div class="chart-container">
            <h2>🔥 关键词趋势（近30天）</h2>
            <div id="keywordChart" class="chart"></div>
        </div>

        <div class="chart-container">
            <h2>🕸️ 话题关系图谱</h2>
            <div id="relationsChart" class="chart relations"></div>
        </div>

        <div class="chart-container">
            <h2>📊 AI 分析统计（近7天）</h2>
            <div id="analysisChart" class="chart"></div>
        </div>

        <div class="footer">
            <p>生成时间：2026-04-30 20:39:05 | TrendRadar v6.6.1</p>
        </div>
    </div>

    <script>
        // 数据
        const data = {
  "overview": {
    "total_memories": 0,
    "daily_summaries": 0,
    "weekly_digests": 0,
    "last_update": null
  },
  "timeline": [],
  "keywords": {},
  "relations": {
    "nodes": [],
    "links": []
  },
  "analysis": {
    "daily_matched": [
      {
        "date": "2026-04-26",
        "news": 421,
        "rss": 16,
        "matched": 2
      }
    ],
    "tag_distribution": {
      "大模型与AI产品": 1,
      "金融市场": 1
    },
    "platform_distribution": {}
  }
};

        // 渲染概览统计
        function renderStats() {
            const statsGrid = document.getElementById('statsGrid');
            const overview = data.overview;

            const stats = [
                { label: '总记忆数', value: overview.total_memories, icon: '📚' },
                { label: '每日摘要', value: overview.daily_summaries, icon: '📝' },
                { label: '每周汇总', value: overview.weekly_digests, icon: '📊' },
                { label: '最新更新', value: overview.last_update ? new Date(overview.last_update).toLocaleDateString('zh-CN') : '暂无', icon: '🕐' }
            ];

            statsGrid.innerHTML = stats.map(stat => `
                <div class="stat-card">
                    <h3>${stat.icon} ${stat.label}</h3>
                    <div class="value">${stat.value}</div>
                </div>
            `).join('');
        }

        // 记忆时间线
        function renderTimeline() {
            const chart = echarts.init(document.getElementById('timelineChart'));
            const timeline = data.timeline;

            const option = {
                tooltip: {
                    trigger: 'item',
                    formatter: function(params) {
                        const item = params.data;
                        return `
                            <strong>${item.title}</strong><br/>
                            类型: ${item.type}<br/>
                            日期: ${item.date}<br/>
                            创建: ${new Date(item.created_at).toLocaleString('zh-CN')}
                        `;
                    }
                },
                xAxis: {
                    type: 'time',
                    boundaryGap: false
                },
                yAxis: {
                    type: 'category',
                    data: ['每日摘要', '每周汇总', '其他']
                },
                series: [{
                    type: 'scatter',
                    symbolSize: 20,
                    data: timeline.map(item => {
                        let yIndex = item.type === 'daily_summary' ? 0 : item.type === 'weekly_digest' ? 1 : 2;
                        return {
                            value: [item.date, yIndex],
                            title: item.title,
                            type: item.type,
                            created_at: item.created_at,
                            start_date: item.date
                        };
                    }),
                    itemStyle: {
                        color: function(params) {
                            const type = params.data.type;
                            return type === 'daily_summary' ? '#667eea' :
                                   type === 'weekly_digest' ? '#764ba2' : '#999';
                        }
                    }
                }]
            };

            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }

        // 关键词趋势
        function renderKeywords() {
            const chart = echarts.init(document.getElementById('keywordChart'));
            const keywords = data.keywords;

            // 取前10个关键词
            const topKeywords = Object.entries(keywords)
                .sort((a, b) => b[1].length - a[1].length)
                .slice(0, 10);

            const series = topKeywords.map(([keyword, dataPoints]) => ({
                name: keyword,
                type: 'line',
                smooth: true,
                data: dataPoints.map(point => [point.date, point.frequency])
            }));

            const option = {
                tooltip: {
                    trigger: 'axis'
                },
                legend: {
                    data: topKeywords.map(([keyword]) => keyword),
                    bottom: 0
                },
                xAxis: {
                    type: 'time'
                },
                yAxis: {
                    type: 'value',
                    name: '频次'
                },
                series: series
            };

            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }

        // 话题关系图谱
        function renderRelations() {
            const chart = echarts.init(document.getElementById('relationsChart'));
            const relations = data.relations;

            if (!relations || !relations.nodes || relations.nodes.length === 0) {
                document.getElementById('relationsChart').innerHTML = '<p style="text-align:center;padding:50px;color:#999;">暂无关系数据</p>';
                return;
            }

            const option = {
                tooltip: {},
                series: [{
                    type: 'graph',
                    layout: 'force',
                    data: relations.nodes.map(node => ({
                        id: node.id,
                        name: node.name,
                        symbolSize: 50,
                        itemStyle: {
                            color: node.type === 'daily_summary' ? '#667eea' :
                                   node.type === 'weekly_digest' ? '#764ba2' : '#999'
                        }
                    })),
                    links: relations.links.map(link => ({
                        source: link.source,
                        target: link.target
                    })),
                    roam: true,
                    label: {
                        show: true,
                        position: 'right',
                        formatter: '{b}'
                    },
                    force: {
                        repulsion: 100
                    }
                }]
            };

            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }

        // AI 分析统计
        function renderAnalysis() {
            const chart = echarts.init(document.getElementById('analysisChart'));
            const analysis = data.analysis;

            const option = {
                tooltip: {
                    trigger: 'axis'
                },
                legend: {
                    data: ['新闻数', 'RSS数', '匹配数']
                },
                xAxis: {
                    type: 'category',
                    data: analysis.daily_matched.map(item => item.date)
                },
                yAxis: {
                    type: 'value'
                },
                series: [
                    {
                        name: '新闻数',
                        type: 'bar',
                        data: analysis.daily_matched.map(item => item.news)
                    },
                    {
                        name: 'RSS数',
                        type: 'bar',
                        data: analysis.daily_matched.map(item => item.rss)
                    },
                    {
                        name: '匹配数',
                        type: 'line',
                        data: analysis.daily_matched.map(item => item.matched)
                    }
                ]
            };

            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }

        // 初始化
        renderStats();
        renderTimeline();
        renderKeywords();
        renderRelations();
        renderAnalysis();
    </script>
</body>
</html>
